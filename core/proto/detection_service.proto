syntax = "proto3";

package detection;

import "base.proto";

// Object Detection Service.
service ObjectDetection {
  // Run object detection on one or more images.
  rpc Predict(DetectionRequest) returns (DetectionResponse);
  // Load a detection model onto a device.
  rpc LoadModel(base.LoadModelRequest) returns (base.ModelResponse);
  // Unload a detection model from a device.
  rpc UnloadModel(base.UnloadModelRequest) returns (base.ModelResponse);
  // List loaded detection models.
  rpc ListModels(base.ListModelsRequest) returns (base.ListModelsResponse);
  // Health check.
  rpc HealthCheck(base.HealthCheckRequest) returns (base.HealthCheckResponse);
}

// Parameters specific to object detection inference.
message DetectionParams {
  base.InferenceParams base = 1;
  double confidence_threshold = 2; // Minimum detection confidence
  double nms_iou_threshold = 3;    // IoU threshold for non-maximum suppression
}

// A single bounding box detection result.
message BoundingBox {
  int32 x_min = 1;
  int32 y_min = 2;
  int32 x_max = 3;
  int32 y_max = 4;
  float confidence = 5;
  int32 class_id = 6;
  string label = 7;               // Human-readable class name for class_id
}

// Per-image detection results.
message DetectionResults {
  repeated string names = 1;       // Class name list ordered by class id
  repeated BoundingBox boxes = 2;
  int32 image_id = 3;
  base.ImageCacheInfo cache_info = 4;
}

// Request for object detection inference.
message DetectionRequest {
  base.RequestHeader request_header = 1;
  repeated base.Image images = 2;
  DetectionParams params = 3;
}

// Response containing detection results.
message DetectionResponse {
  base.ResponseHeader response_header = 1;
  repeated DetectionResults results = 2;
  string model_name = 3;
  string model_version = 4;
}